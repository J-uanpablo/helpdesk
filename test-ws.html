<!DOCTYPE html>
<html>

<body>
    <script>
        let ws = new WebSocket("ws://localhost:3000/tickets/2/chat?token=PEGATUJWT");
        ws.onopen = () => console.log("Conectado");
        ws.onerror = e => console.log("Error", e);
        ws.onclose = () => console.log("Cerrado");
        ws.onmessage = e => console.log("Mensaje:", e.data);
    </script>
</body>

</html>
